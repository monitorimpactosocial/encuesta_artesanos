<style>
:root{
  --bg:#f4f7f3; --bg2:#e8f0e6; --card:#ffffff; --ink:#10231d; --muted:#63766d;
  --brand:#0f3d33; --brand2:#12624f; --accent:#c8a24a; --accent2:#e5c66a; --danger:#b42318;

*{box-sizing:border-box}

button,input,select,textarea{font:inherit}
button{cursor:pointer}
.app-shell{min-height:100vh;display:grid;grid-template-columns:300px 1fr;}
.sidebar{position:sticky;top:0;height:100vh;padding:22px;background:linear-gradient(180deg,#0f3d33,#09231e);color:#fff;overflow:auto;}
.brand{display:flex;gap:14px;align-items:center;margin-bottom:22px}.brand-mark{width:48px;height:48px;border-radius:18px;background:linear-gradient(135deg,var(--accent2),var(--accent));display:grid;place-items:center;color:#10231d;font-weight:900;box-shadow:0 10px 30px rgba(0,0,0,.22)}

.nav{display:grid;gap:8px;margin:24px 0}.nav button{width:100%;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.06);color:#fff;border-radius:16px;padding:12px 14px;text-align:left;display:flex;gap:10px;align-items:center}.nav button.active,.nav button:hover{background:rgba(229,198,106,.18);border-color:rgba(229,198,106,.55)}
.side-card{border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.08);border-radius:20px;padding:14px;margin-top:16px}.side-card h3{margin:0 0 8px;font-size:13px}.side-card p{margin:0;color:rgba(255,255,255,.76);font-size:12px;line-height:1.45}.side-links a{color:#fff;display:block;margin:8px 0;font-size:12px;text-decoration:none}.side-links a:hover{text-decoration:underline}
.main{padding:26px;min-width:0}.topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:20px}.page-title h2{font-size:28px;line-height:1.05;margin:0}.page-title p{margin:7px 0 0;color:var(--muted)}.userbox{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.pill{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:999px;padding:7px 11px;background:#fff;color:var(--muted);font-size:12px}.pill.ok{border-color:#b8e2d4;color:var(--ok);background:#f0fbf7}.pill.warn{border-color:#f3d69b;color:var(--warn);background:#fff8e8}.pill.dark{border-color:rgba(255,255,255,.18);background:rgba(255,255,255,.09);color:#fff}
.card{background:rgba(255,255,255,.9);backdrop-filter:blur(10px);border:1px solid rgba(219,229,221,.85);border-radius:var(--radius);box-shadow:var(--shadow);padding:var(--pad);margin-bottom:18px}.card h3{margin:0 0 8px;font-size:18px}.muted{color:var(--muted)}.small{font-size:12px}.grid{display:grid;gap:16px}.grid.cols-2{grid-template-columns:repeat(2,minmax(0,1fr))}.grid.cols-3{grid-template-columns:repeat(3,minmax(0,1fr))}.grid.cols-4{grid-template-columns:repeat(4,minmax(0,1fr))}

.btn{border:0;border-radius:15px;padding:11px 15px;background:var(--brand);color:#fff;font-weight:750;box-shadow:0 10px 22px rgba(15,61,51,.18)}.btn:hover{background:var(--brand2)}.btn.secondary{background:#fff;color:var(--brand);border:1px solid var(--line);box-shadow:none}.btn.ghost{background:transparent;color:var(--brand);border:1px solid var(--line);box-shadow:none}.btn.warn{background:var(--warn)}.btn.danger{background:var(--danger)}.btn:disabled{opacity:.55;cursor:not-allowed}.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center}.toolbar.right{justify-content:flex-end}
.form-progress{height:12px;border-radius:999px;background:#dfe9e2;overflow:hidden}.form-progress>div{height:100%;background:linear-gradient(90deg,var(--brand2),var(--accent));width:0;transition:width .25s ease}.section-tabs{display:flex;gap:8px;overflow:auto;padding:2px 0 10px}.section-tabs button{border:1px solid var(--line);background:#fff;color:var(--muted);border-radius:999px;padding:9px 12px;white-space:nowrap}.section-tabs button.active{background:var(--brand);border-color:var(--brand);color:#fff}.section-title{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;border-bottom:1px solid var(--line);padding-bottom:14px;margin-bottom:16px}.section-title h3{font-size:22px;margin:0}.q-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.q{border:1px solid var(--line);background:#fff;border-radius:18px;padding:14px}.q.full{grid-column:1/-1}.q label{display:block;font-weight:750;margin-bottom:8px}.q .help{font-size:12px;color:var(--muted);line-height:1.35;margin-top:6px}.req{color:var(--danger);font-weight:900;margin-left:3px}.control{width:100%;border:1px solid var(--line);border-radius:14px;padding:11px 12px;background:#fbfdfb;color:var(--ink);outline:none}.control:focus{border-color:var(--brand2);box-shadow:0 0 0 4px rgba(18,98,79,.12)}textarea.control{min-height:92px;resize:vertical}.buttons{display:flex;gap:8px;flex-wrap:wrap}.choice{border:1px solid var(--line);background:#fff;color:var(--ink);border-radius:999px;padding:9px 12px}.choice.active{background:var(--brand);color:#fff;border-color:var(--brand)}.check-list{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}.check-item{display:flex;gap:8px;align-items:flex-start;border:1px solid var(--line);border-radius:14px;padding:10px;background:#fbfdfb}.geo-box,.photo-box{border:1px dashed #b9cac0;border-radius:16px;padding:12px;background:#fbfdfb}.preview-img{max-width:100%;max-height:160px;border-radius:14px;margin-top:10px;border:1px solid var(--line)}
.roster{display:grid;gap:10px}.roster-row{display:grid;grid-template-columns:1.2fr .8fr .6fr .5fr;gap:8px;align-items:center}.roster-row button{height:42px}.notice{border:1px solid #f0d79a;background:#fff9e9;border-radius:18px;padding:13px;color:#6e4d08;line-height:1.4}.success{border:1px solid #a7e0c8;background:#effbf5;color:#0f5b43;border-radius:18px;padding:13px}.error{border:1px solid #f2bbb6;background:#fff1f0;color:#8f1d16;border-radius:18px;padding:13px}
.kpi{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;border:1px solid var(--line);border-radius:20px;background:#fff;padding:16px}.kpi b{font-size:28px;line-height:1}.kpi span{font-size:12px;color:var(--muted)}.bar-list{display:grid;gap:10px}.bar-row{display:grid;grid-template-columns:minmax(120px,1fr) 3fr 54px;gap:10px;align-items:center}.bar-track{height:12px;background:#e7efe9;border-radius:999px;overflow:hidden}.bar-fill{height:100%;background:linear-gradient(90deg,var(--brand2),var(--accent));border-radius:999px}.table-wrap{overflow:auto;border:1px solid var(--line);border-radius:18px;background:#fff}table{width:100%;border-collapse:collapse;min-width:760px}th,td{text-align:left;padding:10px 12px;border-bottom:1px solid var(--line);font-size:13px;vertical-align:top}th{background:#f3f7f3;color:#33443d;font-weight:800;position:sticky;top:0}tr:hover td{background:#fafdfa}.login-panel{max-width:430px;margin:40px auto}.modal-back{position:fixed;inset:0;background:rgba(6,24,20,.52);z-index:20;display:grid;place-items:center;padding:20px}.modal{width:min(780px,100%);max-height:90vh;overflow:auto;background:#fff;border-radius:24px;box-shadow:0 30px 80px rgba(0,0,0,.28);padding:20px}.hidden{display:none!important}.footer{color:var(--muted);font-size:12px;margin-top:24px;text-align:center}.loader{display:inline-block;width:18px;height:18px;border:3px solid rgba(15,61,51,.2);border-top-color:var(--brand);border-radius:50%;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}

@media (max-width:980px){.app-shell{grid-template-columns:1fr}.sidebar{position:relative;height:auto}.main{padding:16px}.hero{grid-template-columns:1fr}.field-map-layout{grid-template-columns:1fr}.field-map-box{height:68vh;min-height:420px}.q-grid,.grid.cols-2,.grid.cols-3,.grid.cols-4{grid-template-columns:1fr}.roster-row{grid-template-columns:1fr 1fr 1fr auto}.topbar{align-items:flex-start;flex-direction:column}.page-title h2{font-size:24px}.hero h2{font-size:27px}}

</style>
