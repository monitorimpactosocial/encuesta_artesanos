<div id="app"></div>
<script>
(function(){
  'use strict';
  const DRAFT_KEY = 'encuesta_artesanos_isla_hermosa_draft_v1';
  const SESSION_KEY = 'encuesta_artesanos_session_v1';
  const app = document.getElementById('app');
  const ctx = window.SERVER_CONTEXT || {};
  const state = {
    tab: 'inicio',
    schema: null,
    bootstrap: null,
    session: null,
    values: {},
    gps: {},
    photos: {},
    currentSection: 0,
    loading: false,
    message: null,
    dashboard: null,
    dashboardError: null,
    fieldMap: null,
    fieldMapError: null,
    fieldMapInstance: null,
    fieldMapSelected: {},
    responses: null,
    responsesError: null,
    adminUsers: null,
    adminUsersError: null,
    filters: {},
    startTs: new Date().toISOString(),
    sourceUuid: cryptoRandom_()
  };

  function callServer(fn){
    var args = Array.prototype.slice.call(arguments, 1);
    return new Promise(function(resolve, reject){
      var done = false;
      var timer = setTimeout(function(){
        if(!done){ done=true; reject(new Error('Sin respuesta del servidor ('+fn+'). Intente de nuevo.')); }
      }, 60000);
      var runner = google.script.run
        .withSuccessHandler(function(r){ if(!done){ done=true; clearTimeout(timer); resolve(r); } })
        .withFailureHandler(function(e){ if(!done){ done=true; clearTimeout(timer); var m=e&&(e.message||e); reject(new Error(m?String(m):'Error del servidor')); } });
      runner[fn].apply(runner, args);
    });
  }
  function esc(v){return String(v==null?'':v).replace(/[&<>'"]/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[s]));}
  function n(v){return Number(v||0).toLocaleString('es-PY');}
  function pct(v){return (Number(v||0)).toLocaleString('es-PY',{maximumFractionDigits:1})+'%';}
  function today(){return new Date().toISOString().slice(0,10);}
  function cryptoRandom_(){
    try { return ([1e7]+-1e3+-4e3+-8e3+-1e11).replace(/[018]/g,c=>(c^crypto.getRandomValues(new Uint8Array(1))[0]&15>>c/4).toString(16)); }
    catch(e){ return 'ART_'+Date.now()+'_'+Math.random().toString(16).slice(2); }
  }
  function toast(type, text){state.message={type,text}; render(); setTimeout(()=>{state.message=null; render();},5500);}
  function setLoading(v){state.loading=!!v; render();}
  function sessionToken(){return state.session && state.session.token ? state.session.token : '';}
  function saveSession(s){state.session=s; localStorage.setItem(SESSION_KEY, JSON.stringify(s||{}));}
  function restoreSession(){try{const s=JSON.parse(localStorage.getItem(SESSION_KEY)||'null'); if(s&&s.token) state.session=s;}catch(e){}}
  function saveDraft(){
    localStorage.setItem(DRAFT_KEY, JSON.stringify({values:state.values,gps:state.gps,photosMeta:Object.keys(state.photos),startTs:state.startTs,sourceUuid:state.sourceUuid,ts:new Date().toISOString()}));
  }
  function restoreDraft(){
    try{
      const d=JSON.parse(localStorage.getItem(DRAFT_KEY)||'null');
      if(d&&d.values){state.values=d.values||{}; state.gps=d.gps||{}; state.startTs=d.startTs||new Date().toISOString(); state.sourceUuid=d.sourceUuid||cryptoRandom_(); return true;}
    }catch(e){}
    return false;
  }
  function clearDraft(){localStorage.removeItem(DRAFT_KEY); state.values={}; state.gps={}; state.photos={}; state.startTs=new Date().toISOString(); state.sourceUuid=cryptoRandom_(); seedDefaults_(); render();}
  function seedDefaults_(){
    if(!state.values.fecha_encuesta) state.values.fecha_encuesta=today();
    if(!state.values.comunidad) state.values.comunidad='Isla Hermosa';
    if(!state.values.departamento) state.values.departamento='Concepción';
    if(!state.values.edicion && state.bootstrap) state.values.edicion=state.bootstrap.app.activeEdition;
  }

  async function init(){
    restoreSession();
    renderSkeleton_();
    try{
      const [bootstrap, schema] = await Promise.all([callServer('getBootstrap', sessionToken()), callServer('getSurveySchema')]);
      state.bootstrap=bootstrap; state.schema=schema;
      if(bootstrap.session) state.session=Object.assign({token:sessionToken()}, bootstrap.session); else { state.session=null; localStorage.removeItem(SESSION_KEY); }
      restoreDraft(); seedDefaults_();
      render();
      if(state.session) loadDashboard_();
    }catch(err){app.innerHTML='<div class="login-panel card error"><h3>Error al cargar</h3><p>'+esc(err.message||err)+'</p></div>';}
  }

  function renderSkeleton_(){app.innerHTML='<div class="app-shell"><aside class="sidebar"><div class="brand"><div class="brand-mark">IH</div><div><h1>Artesanos Isla Hermosa</h1><p>Paracel · Monitor de Impacto Social</p></div></div><div class="side-card"><span class="loader"></span> Cargando aplicativo...</div></aside><main class="main"><div class="card"><span class="loader"></span> Preparando formulario y catálogos.</div></main></div>';}

  function render(){
    if(!state.schema || !state.bootstrap){renderSkeleton_();return;}
    var viewHtml;
    try { viewHtml = view_(); }
    catch(e){
      if(state.tab==='dashboard') state.dashboardError = String(e);
      if(state.tab==='respuestas') state.responsesError = String(e);
      viewHtml = '<div class="card error"><h3>Error al mostrar la vista</h3><p>'+esc(String(e))+'</p></div>';
    }
    try {
      app.innerHTML = '<div class="app-shell">'+sidebar_()+'<main class="main">'+topbar_()+message_()+viewHtml+footer_()+'</main></div>';
    } catch(e2){
      app.innerHTML = '<div style="padding:2rem;color:red"><b>Error crítico:</b> '+String(e2)+'</div>';
      return;
    }
    bindGlobal_();
    if(state.tab==='formulario') bindSurvey_();
    if(state.tab==='dashboard') bindDashboard_();
    if(state.tab==='mapa') bindFieldMap_();
    if(state.tab==='respuestas') bindResponses_();
    if(state.tab==='admin') bindAdmin_();
  }
  function sidebar_(){
    const links=state.bootstrap.app.links||{};
    const nav=[['inicio','🏠','Inicio'],['formulario','📝','Formulario'],['mapa','🗺️','Mapa territorial'],['dashboard','📊','Dashboard'],['respuestas','🗂️','Respuestas'],['admin','⚙️','Administración']];
    return '<aside class="sidebar"><div class="brand"><div class="brand-mark">IH</div><div><h1>'+esc(state.bootstrap.app.appName)+'</h1><p>'+esc(state.bootstrap.app.projectName)+'</p></div></div>'+ 
      '<div class="nav">'+nav.map(x=>'<button data-nav="'+x[0]+'" class="'+(state.tab===x[0]?'active':'')+'"><span>'+x[1]+'</span><b>'+x[2]+'</b></button>').join('')+'</div>'+ 
      '<div class="side-card"><h3>Operativo</h3><p>Formulario optimizado para relevamiento socioeconómico, productivo y comercial de artesanos de Isla Hermosa.</p></div>'+ 
      '<div class="side-card"><h3>Estado</h3><p>Edición activa: <b>'+esc(state.bootstrap.app.activeEdition)+'</b><br>Sesión: <b>'+(state.session?esc(state.session.displayName||state.session.username):'sin iniciar')+'</b></p></div>'+ 
      '<div class="side-card side-links"><h3>Recursos</h3><a href="'+esc(links.spreadsheetUrl)+'" target="_blank">Abrir Google Sheet</a><a href="'+esc(links.photosFolderUrl)+'" target="_blank">Abrir carpeta de fotos</a><a href="'+esc(links.repositoryUrl)+'" target="_blank">Repositorio GitHub</a></div>'+ 
      '</aside>';
  }
  function topbar_(){
    const title={inicio:'Inicio',formulario:'Carga de encuesta',mapa:'Mapa territorial',dashboard:'Dashboard gerencial',respuestas:'Consulta de respuestas',admin:'Administración'}[state.tab]||'';
    return '<div class="topbar"><div class="page-title"><h2>'+title+'</h2><p>'+esc(state.bootstrap.app.orgName)+' · '+esc(state.bootstrap.app.projectName)+'</p></div><div class="userbox">'+
      (state.loading?'<span class="pill"><span class="loader"></span> Procesando</span>':'')+
      (state.session?'<span class="pill ok">● '+esc(state.session.displayName||state.session.username)+' · '+esc(state.session.role)+'</span><button class="btn secondary" id="logoutBtn">Salir</button>':'<button class="btn" id="openLogin">Iniciar sesión</button>')+
      '</div></div>';
  }
  function message_(){if(!state.message)return''; const cls=state.message.type==='error'?'error':(state.message.type==='success'?'success':'notice'); return '<div class="'+cls+'">'+esc(state.message.text)+'</div>';}
  function footer_(){return '<div class="footer">Paracel S.A. · Encuesta a Artesanos de Isla Hermosa · Versión 1.0.0</div>';}
  function view_(){
    if(state.tab==='inicio') return homeView_();
    if(state.tab==='formulario') return surveyView_();
    if(state.tab==='mapa') return authGate_(fieldMapView_);
    if(state.tab==='dashboard') return authGate_(dashboardView_);
    if(state.tab==='respuestas') return authGate_(responsesView_);
    if(state.tab==='admin') return authGate_(adminView_, ['admin','editor']);
    return homeView_();
  }
  function authGate_(renderFn, roles){
    if(!state.session) return loginView_('Para acceder a esta vista debe iniciar sesión.');
    if(roles && roles.indexOf(state.session.role)<0) return '<div class="card error"><h3>Permisos insuficientes</h3><p>Esta vista requiere rol '+roles.join(' o ')+'.</p></div>';
    return renderFn();
  }

  function homeView_(){
    return '<section class="hero"><div class="card"><h2>Relevamiento integral para artesanos de Isla Hermosa</h2><p class="muted">Esta aplicación combina las mejores funcionalidades ya usadas en encuestas de colaboradores y pescadores: formulario por secciones, georreferenciación, fotos comprimidas, guardado automático local, validaciones, tablero gerencial, auditoría y base analítica sin datos personales.</p><div class="toolbar"><button class="btn" data-nav="formulario">Iniciar nueva entrevista</button><button class="btn secondary" data-nav="dashboard">Ver dashboard</button></div><div class="hero-stat"><div class="stat"><strong>'+state.schema.sections.length+'</strong><span>secciones del instrumento</span></div><div class="stat"><strong>'+questionCount_()+'</strong><span>variables/preguntas configuradas</span></div><div class="stat"><strong>'+state.schema.app.photoFields.length+'</strong><span>slots de fotografías</span></div><div class="stat"><strong>'+state.schema.app.geoFields.length+'</strong><span>puntos GPS posibles</span></div></div></div><div class="card"><h3>Componentes integrados</h3><div class="bar-list"><div class="notice">✓ Captura socioeconómica, educativa, sanitaria y de vivienda.</div><div class="notice">✓ Módulo productivo artesanal: materia prima, producción, ventas e ingresos.</div><div class="notice">✓ Formalización, asociatividad, financiamiento y necesidades de apoyo.</div><div class="notice">✓ Evidencia fotográfica y ubicación para control de calidad.</div></div></div></section>';
  }
  function questionCount_(){return state.schema.sections.reduce((a,s)=>a+s.questions.length,0);}

  function loginView_(msg){
    return '<div class="login-panel card"><h3>Iniciar sesión</h3><p class="muted">'+esc(msg||'Ingrese sus credenciales Paracel.')+'</p><div class="grid"><label>Usuario<input class="control" id="loginUser" placeholder="ej: diego.meza" autocomplete="username"></label><label>Contraseña<input class="control" id="loginPass" type="password" placeholder="6 dígitos" autocomplete="current-password"></label><button class="btn" id="loginBtn">Iniciar sesión</button></div><div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border)"><p class="small muted">¿Primera vez o no puede ingresar? Restablezca los usuarios a los valores por defecto.</p><button class="btn secondary small" id="resetUsersBtn" style="font-size:12px">Restablecer usuarios</button></div></div>';
  }

  function surveyView_(){
    const sections=state.schema.sections;
    const i=Math.max(0,Math.min(state.currentSection,sections.length-1));
    const sec=sections[i];
    const progress=Math.round(((i+1)/sections.length)*100);
    return '<div class="card"><div class="section-title"><div><h3>Formulario de entrevista</h3><p class="muted">Avance de secciones: '+(i+1)+' de '+sections.length+' · '+progress+'%</p></div><div class="toolbar right"><button class="btn secondary" id="saveDraftBtn">Guardar borrador</button><button class="btn ghost" id="clearDraftBtn">Nueva entrevista</button></div></div><div class="form-progress"><div style="width:'+progress+'%"></div></div><div class="section-tabs">'+sections.map((s,idx)=>'<button class="'+(idx===i?'active':'')+'" data-section="'+idx+'">'+(idx+1)+'. '+esc(s.label)+'</button>').join('')+'</div></div>'+ 
      '<div class="card"><div class="section-title"><div><h3>'+esc(sec.label)+'</h3><p class="muted">Complete los campos requeridos marcados con asterisco.</p></div><span class="pill">'+esc(sec.id)+'</span></div><div class="q-grid">'+sec.questions.map(q=>renderQuestion_(q)).join('')+'</div><div class="toolbar" style="margin-top:18px;justify-content:space-between"><div><button class="btn secondary" id="prevSec" '+(i===0?'disabled':'')+'>Anterior</button> <button class="btn secondary" id="nextSec" '+(i===sections.length-1?'disabled':'')+'>Siguiente</button></div><button class="btn" id="submitSurveyBtn">Enviar encuesta</button></div></div>';
  }
  function isVisible_(q){
    const v=q.visible_if; if(!v||!v.field)return true;
    const cur=state.values[v.field];
    if(v.contains!==undefined){
      const needle=String(v.contains);
      try{const arr=JSON.parse(cur||'[]');return Array.isArray(arr)&&arr.some(function(x){return String(x)===needle;});}
      catch(x){return String(cur||'').indexOf(needle)>=0;}
    }
    if(v.equals!==undefined) return String(cur||'')===String(v.equals);
    if(v.not_empty) return cur!==undefined && cur!==null && String(cur)!=='';
    return true;
  }
  function renderQuestion_(q){
    if(!isVisible_(q)) return '';
    const full=['textarea','roster','photo','geolocation','checkbox_group','multiselect'].indexOf(q.input_type)>=0 ? ' full' : '';
    const req=q.required?'<span class="req">*</span>':'';
    return '<div class="q'+full+'" data-q="'+esc(q.field_name)+'"><label>'+esc(q.label)+req+'</label>'+input_(q)+(q.help_text?'<div class="help">'+esc(q.help_text)+'</div>':'')+'</div>';
  }
  function input_(q){
    const f=q.field_name, val=state.values[f]||'';
    if(q.input_type==='textarea') return '<textarea class="control" data-field="'+esc(f)+'">'+esc(val)+'</textarea>';
    if(q.input_type==='number') return '<input class="control" type="number" inputmode="decimal" data-field="'+esc(f)+'" value="'+esc(val)+'">';
    if(q.input_type==='date') return '<input class="control" type="date" data-field="'+esc(f)+'" value="'+esc(val)+'">';
    if(q.input_type==='select') return '<select class="control" data-field="'+esc(f)+'"><option value="">Seleccione...</option>'+q.options.map(o=>'<option '+(String(val)===String(o.value)?'selected':'')+' value="'+esc(o.value)+'">'+esc(o.label)+'</option>').join('')+'</select>';
    if(q.input_type==='buttons') return '<div class="buttons" data-buttons="'+esc(f)+'">'+q.options.map(o=>'<button type="button" class="choice '+(String(val)===String(o.value)?'active':'')+'" data-choice="'+esc(o.value)+'">'+esc(o.label)+'</button>').join('')+'</div>';
    if(q.input_type==='checkbox_group' || q.input_type==='multiselect'){
      const arr=Array.isArray(val)?val:(val?String(val).split(';').map(x=>x.trim()):[]);
      return '<div class="check-list">'+q.options.map(o=>'<label class="check-item"><input type="checkbox" data-check="'+esc(f)+'" value="'+esc(o.value)+'" '+(arr.indexOf(o.value)>=0?'checked':'')+'> <span>'+esc(o.label)+'</span></label>').join('')+'</div>';
    }
    if(q.input_type==='geolocation'){
      const g=state.gps[f]||{}; const txt=g.lat?('Lat '+Number(g.lat).toFixed(6)+' · Lng '+Number(g.lng).toFixed(6)+' · precisión '+Math.round(g.accuracy||0)+' m'):'Sin capturar';
      return '<div class="geo-box"><div class="toolbar"><button type="button" class="btn secondary" data-geo="'+esc(f)+'">📍 Capturar GPS</button><span class="pill '+(g.lat?'ok':'warn')+'">'+esc(txt)+'</span></div></div>';
    }
    if(q.input_type==='photo'){
      const p=state.photos[f];
      return '<div class="photo-box"><input class="control" type="file" accept="image/*" capture="environment" data-photo="'+esc(f)+'">'+(p?'<img class="preview-img" src="'+esc(p.dataUrl)+'"><p class="small muted">'+esc(p.name)+' · '+Math.round((p.size||0)/1024)+' KB</p>':'<p class="small muted">Sin foto seleccionada.</p>')+'</div>';
    }
    if(q.input_type==='roster') return rosterInput_(f);
    return '<input class="control" type="text" data-field="'+esc(f)+'" value="'+esc(val)+'">';
  }
  function rosterInput_(field){
    const arr=Array.isArray(state.values[field])?state.values[field]:[];
    return '<div class="roster" id="rosterBox"><div class="toolbar"><button type="button" class="btn secondary" id="addRoster">Agregar integrante</button><span class="pill">'+arr.length+' integrantes</span></div>'+arr.map((m,i)=>'<div class="roster-row"><input class="control" data-roster="'+i+'" data-roster-field="parentesco" placeholder="Parentesco" value="'+esc(m.parentesco||'')+'"><select class="control" data-roster="'+i+'" data-roster-field="sexo"><option value="">Sexo</option><option '+(m.sexo==='Femenino'?'selected':'')+'>Femenino</option><option '+(m.sexo==='Masculino'?'selected':'')+'>Masculino</option><option '+(m.sexo==='Otro / no responde'?'selected':'')+'>Otro / no responde</option></select><input class="control" type="number" data-roster="'+i+'" data-roster-field="edad" placeholder="Edad" value="'+esc(m.edad||'')+'"><button type="button" class="btn danger" data-remove-roster="'+i+'">×</button></div>').join('')+'</div>';
  }

  function bindGlobal_(){
    document.querySelectorAll('[data-nav]').forEach(b=>b.onclick=()=>{state.tab=b.dataset.nav; render(); if(state.tab==='mapa' && !state.fieldMap && !state.fieldMapError) loadFieldMap_(); if(state.tab==='dashboard' && !state.dashboard && !state.dashboardError) loadDashboard_(); if(state.tab==='respuestas' && !state.responses && !state.responsesError) loadResponses_();});
    const openLogin=document.getElementById('openLogin'); if(openLogin) openLogin.onclick=()=>showLoginModal_();
    const logoutBtn=document.getElementById('logoutBtn'); if(logoutBtn) logoutBtn.onclick=()=>{callServer('logout',sessionToken()).finally(()=>{state.session=null;localStorage.removeItem(SESSION_KEY);toast('success','Sesión cerrada.');});};
    const loginBtn=document.getElementById('loginBtn'); if(loginBtn) loginBtn.onclick=doLogin_;
    const resetBtn=document.getElementById('resetUsersBtn'); if(resetBtn) resetBtn.onclick=doResetUsers_;
  }
  function showLoginModal_(){
    document.body.insertAdjacentHTML('beforeend','<div class="modal-back" id="loginModal"><div class="modal"><div class="toolbar" style="justify-content:space-between"><h3>Iniciar sesión</h3><button class="btn secondary" id="closeLogin">Cerrar</button></div>'+loginView_('Ingrese sus credenciales administrativas.')+'</div></div>');
    document.getElementById('closeLogin').onclick=()=>document.getElementById('loginModal').remove();
    document.querySelector('#loginModal #loginBtn').onclick=doLogin_;
    const mrb=document.querySelector('#loginModal #resetUsersBtn'); if(mrb) mrb.onclick=doResetUsers_;
  }
  async function doLogin_(){
    const u=(document.getElementById('loginUser')||{}).value||'';
    const p=(document.getElementById('loginPass')||{}).value||'';
    setLoading(true);
    try{
      const s=await callServer('login',u,p);
      saveSession(s);
      const m=document.getElementById('loginModal'); if(m)m.remove();
      toast('success','Sesión iniciada correctamente.');
      state.dashboard=null; state.dashboardError=null;
      loadDashboard_();
    }
    catch(err){toast('error',err.message||String(err));}
    finally{setLoading(false);}
  }
  async function doResetUsers_(){
    if(!confirm('¿Restablecer todos los usuarios a los valores por defecto?\n\nCredenciales después del reset:\n  diego.meza / 123456\n  lati / 123456\n  encuestador1..encuestador8 / 123456\n  viewer / 123456\n\nEsta acción sobreescribe cualquier usuario existente.')) return;
    setLoading(true);
    try{
      const r=await callServer('resetUsers');
      toast('success','Usuarios restablecidos ('+r.users+' usuarios). Ingrese con diego.meza / 123456');
      render();
    }
    catch(err){toast('error','Error al restablecer: '+(err.message||String(err)));}
    finally{setLoading(false);}
  }

  function bindSurvey_(){
    document.querySelectorAll('[data-section]').forEach(b=>b.onclick=()=>{state.currentSection=Number(b.dataset.section); render();});
    document.querySelectorAll('[data-field]').forEach(el=>el.oninput=el.onchange=()=>{state.values[el.dataset.field]=el.value; saveDraft(); renderSoftProgress_();});
    document.querySelectorAll('[data-buttons]').forEach(box=>box.querySelectorAll('[data-choice]').forEach(btn=>btn.onclick=()=>{state.values[box.dataset.buttons]=btn.dataset.choice; saveDraft(); render();}));
    document.querySelectorAll('[data-check]').forEach(ch=>ch.onchange=()=>{const f=ch.dataset.check; state.values[f]=Array.from(document.querySelectorAll('[data-check="'+cssEsc_(f)+'"]:checked')).map(x=>x.value); saveDraft();});
    document.querySelectorAll('[data-geo]').forEach(btn=>btn.onclick=()=>captureGeo_(btn.dataset.geo));
    document.querySelectorAll('[data-photo]').forEach(inp=>inp.onchange=()=>handlePhoto_(inp.dataset.photo, inp.files&&inp.files[0]));
    const add=document.getElementById('addRoster'); if(add) add.onclick=()=>{if(!Array.isArray(state.values.miembros_hogar_json))state.values.miembros_hogar_json=[]; state.values.miembros_hogar_json.push({parentesco:'',sexo:'',edad:''}); updateRosterTotals_(); saveDraft(); render();};
    document.querySelectorAll('[data-remove-roster]').forEach(b=>b.onclick=()=>{state.values.miembros_hogar_json.splice(Number(b.dataset.removeRoster),1); updateRosterTotals_(); saveDraft(); render();});
    document.querySelectorAll('[data-roster]').forEach(el=>el.oninput=el.onchange=()=>{const i=Number(el.dataset.roster), f=el.dataset.rosterField; state.values.miembros_hogar_json[i][f]=el.value; updateRosterTotals_(); saveDraft();});
    const prev=document.getElementById('prevSec'); if(prev) prev.onclick=()=>{state.currentSection=Math.max(0,state.currentSection-1); render();};
    const next=document.getElementById('nextSec'); if(next) next.onclick=()=>{state.currentSection=Math.min(state.schema.sections.length-1,state.currentSection+1); render();};
    const save=document.getElementById('saveDraftBtn'); if(save) save.onclick=()=>{saveDraft();toast('success','Borrador guardado en este dispositivo.');};
    const clear=document.getElementById('clearDraftBtn'); if(clear) clear.onclick=()=>{if(confirm('¿Iniciar una nueva entrevista y descartar el borrador local?')) clearDraft();};
    const submit=document.getElementById('submitSurveyBtn'); if(submit) submit.onclick=submitSurvey_;
  }
  function cssEsc_(s){return String(s).replace(/"/g,'\\"');}
  function renderSoftProgress_(){}
  function updateRosterTotals_(){
    const arr=Array.isArray(state.values.miembros_hogar_json)?state.values.miembros_hogar_json:[];
    let mujeres=0,hombres=0,ninos=0,jovenes=0,adultos=0,mayores=0;

  function compressImage_(file,maxW,quality){
    return new Promise((resolve,reject)=>{
      const reader=new FileReader();
      reader.onerror=()=>reject(reader.error);
      reader.onload=()=>{
        const img=new Image(); img.onerror=()=>reject(new Error('Imagen inválida.'));
        img.onload=()=>{
          const scale=Math.min(1,maxW/img.width); const w=Math.round(img.width*scale), h=Math.round(img.height*scale);
          const canvas=document.createElement('canvas'); canvas.width=w; canvas.height=h; const ctx=canvas.getContext('2d'); ctx.drawImage(img,0,0,w,h);
          const dataUrl=canvas.toDataURL('image/jpeg',quality); resolve({fieldName:null,name:file.name.replace(/\.[^.]+$/,'.jpg'),mimeType:'image/jpeg',dataUrl:dataUrl,dataBase64:dataUrl.split(',')[1],size:Math.round(dataUrl.length*0.75)});
        }; img.src=reader.result;
      }; reader.readAsDataURL(file);
    });
  }

  function toggleMapLayer_(layer,on){

  function fieldMapMetrics_(d){
    const pts=d.dwellings||[];
    const area=polygonAreaKm2_(d.boundary||[]);
    let max=0, nearest=[];
    for(let i=0;i<pts.length;i++){
      let best=Infinity;
      for(let j=0;j<pts.length;j++)if(i!==j){
        const dist=haversineKm_(pts[i].lat,pts[i].lng,pts[j].lat,pts[j].lng);
        if(dist>max)max=dist; if(dist<best)best=dist;
      }
      if(isFinite(best))nearest.push(best);
    }
    const avg=nearest.length?nearest.reduce((a,b)=>a+b,0)/nearest.length:0;
    return {areaKm2:area?area.toFixed(1):'—',maxDistanceKm:max?max.toFixed(1):'—',avgNearestM:avg?Math.round(avg*1000):'—'};
  }
  function haversineKm_(a,b,c,d){
    const R=6371, toRad=x=>x*Math.PI/180, dLat=toRad(c-a), dLng=toRad(d-b);
    const q=Math.sin(dLat/2)**2+Math.cos(toRad(a))*Math.cos(toRad(c))*Math.sin(dLng/2)**2;
    return 2*R*Math.atan2(Math.sqrt(q),Math.sqrt(1-q));
  }
  function polygonAreaKm2_(coords){
    if(!coords||coords.length<3)return 0;
    const R=6371, lat0=coords.reduce((s,p)=>s+p[0],0)/coords.length*Math.PI/180;
    const xy=coords.map(p=>[R*(p[1]*Math.PI/180)*Math.cos(lat0), R*(p[0]*Math.PI/180)]);
    let sum=0; for(let i=0;i<xy.length;i++){const a=xy[i],b=xy[(i+1)%xy.length]; sum+=a[0]*b[1]-b[0]*a[1];}
    return Math.abs(sum)/2;
  }
  function userColor_(username,strong){
    const palette=['#2563eb','#16a34a','#dc2626','#9333ea','#ca8a04','#0891b2','#db2777','#4f46e5','#0f766e','#ea580c'];
    if(!username) return {bg:strong?'#475569':'#e5e7eb',border:'#94a3b8',text:strong?'#fff':'#334155'};
    let h=0; String(username).split('').forEach(ch=>h=(h*31+ch.charCodeAt(0))>>>0);
    const hex=palette[h%palette.length];
    return {bg:strong?hex:hexToRgba_(hex,.24),border:hex,text:strong?'#fff':'#0f172a'};
  }
  function hexToRgba_(hex,a){
    const n=parseInt(String(hex).replace('#',''),16);
    return 'rgba('+((n>>16)&255)+','+((n>>8)&255)+','+(n&255)+','+a+')';
  }
  function assignmentLegend_(d){

  function surveyComplexity_(){

    const questions=[]; sections.forEach(sec=>(sec.questions||[]).forEach(q=>questions.push(q)));
    const count=questions.length;

    const minutes=Math.round(Math.max(45, Math.min(95, 12 + count*0.85 + required*0.25 + photos*2.5 + geo*1.5 + text*0.35)));

  function genericFieldUsers_(){
    const users=((state.fieldMap&&state.fieldMap.users)||[]).filter(u=>/^encuestador\d+$/i.test(String(u.username||'')));
    return users.length?users:((state.fieldMap&&state.fieldMap.users)||[]).filter(u=>String(u.role||'')==='editor');
  }
  function sortSpatial_(pts){
    const rows=pts.slice().sort((a,b)=>b.lat-a.lat || a.lng-b.lng);
    if(!rows.length) return [];
    const maxLat=Math.max(...rows.map(p=>p.lat));
    const minLat=Math.min(...rows.map(p=>p.lat));
    const latRange=Math.max(0.0001, maxLat-minLat);
    const bucketSize=Math.max(0.001, latRange/5);
    const buckets={};
    rows.forEach(p=>{const k=Math.floor((maxLat-p.lat)/bucketSize); (buckets[k]||(buckets[k]=[])).push(p);});
    return Object.keys(buckets).sort((a,b)=>Number(a)-Number(b)).flatMap((k,i)=>buckets[k].sort((a,b)=>i%2?b.lng-a.lng:a.lng-b.lng));
  }
  function routeDistanceKm_(pts){
    let total=0;
    for(let i=1;i<pts.length;i++) total+=haversineKm_(pts[i-1].lat,pts[i-1].lng,pts[i].lat,pts[i].lng);
    return total;
  }
  function buildAutoPlan_(userCount, minutesPerSurvey, kmh, startOrder){
    const users=genericFieldUsers_().slice(0, Math.max(1,userCount));
    const dwellings=((state.fieldMap&&state.fieldMap.dwellings)||[]).filter(p=>p.visible!==false && p.status!=='visitada');
    const pending=sortSpatial_(dwellings.filter(p=>!p.assigned_to || p.status==='sin_asignar'));
    const clusters=clusterDwellings_(pending, users.length);
    const groups=users.map((u,i)=>({user:u,points:(clusters[i]||[]),sector:i+1}));
    if(!groups.length || !pending.length) return {groups:groups,assignments:[],pending:pending.length,totalHours:0};
    const assignments=[];
    let totalHours=0;
    groups.forEach(g=>{
      g.points=nearestRoute_(g.points);
      const dist=routeDistanceKm_(g.points);
      const travelMin=kmh>0?(dist/kmh*60):0;
      const surveyMin=g.points.length*minutesPerSurvey;
      totalHours+=((travelMin+surveyMin)/60);
      g.distanceKm=dist; g.minutes=Math.round(travelMin+surveyMin);
      g.points.forEach((p,i)=>assignments.push({
        vivienda_id:p.id,
        assigned_to:g.user.username,
        priority:'normal',
        route_order:String(startOrder+i),
        status:'asignada',
        notes:'Sector '+g.sector+' por cluster de distancia: '+g.points.length+' viviendas; '+minutesPerSurvey+' min/encuesta; '+dist.toFixed(2)+' km ruta; '+g.minutes+' min estimados.'
      }));
    });
    return {groups:groups,assignments:assignments,pending:pending.length,totalHours:totalHours};
  }
  function clusterDwellings_(pts,k){
    if(!pts.length || k<=1)return [pts.slice()];
    k=Math.min(k,pts.length);
    const ordered=sortSpatial_(pts);
    let centers=[];
    for(let i=0;i<k;i++) centers.push(ordered[Math.floor(i*(ordered.length-1)/Math.max(1,k-1))]);
    let groups=[];
    for(let step=0;step<10;step++){
      groups=centers.map(()=>[]);
      pts.forEach(p=>{
        let best=0,bestD=Infinity;
        centers.forEach((c,i)=>{const d=haversineKm_(p.lat,p.lng,c.lat,c.lng); if(d<bestD){bestD=d;best=i;}});
        groups[best].push(p);
      });
      centers=groups.map((g,i)=>g.length?{lat:g.reduce((s,p)=>s+p.lat,0)/g.length,lng:g.reduce((s,p)=>s+p.lng,0)/g.length}:centers[i]);
    }
    return groups
      .map((g,i)=>({points:g,center:centers[i]}))
      .sort((a,b)=>a.center.lng-b.center.lng || b.center.lat-a.center.lat)
      .map(g=>g.points);
  }
  function nearestRoute_(pts){
    const left=pts.slice();
    const route=[];
    if(!left.length) return route;
    left.sort((a,b)=>a.lng-b.lng || b.lat-a.lat);
    route.push(left.shift());
    while(left.length){
      const last=route[route.length-1];
      let best=0, bestD=Infinity;
      left.forEach((p,i)=>{const d=haversineKm_(last.lat,last.lng,p.lat,p.lng); if(d<bestD){bestD=d;best=i;}});
      route.push(left.splice(best,1)[0]);
    }
    return route;
  }
  function updatePlanPreview_(){
    const box=document.getElementById('planPreview'); if(!box)return;
    const userCount=Number(document.getElementById('planUsers')?.value||4);
    const minutes=Number(document.getElementById('planMinutes')?.value||surveyTimeEstimate_());
    const kmh=Number(document.getElementById('planTravelKmh')?.value||3.5);
    const start=Number(document.getElementById('planStartOrder')?.value||1);
    const plan=buildAutoPlan_(userCount,minutes,kmh,start);
    if(!plan.assignments.length){box.textContent='No hay viviendas pendientes para planificar o no hay usuarios genericos disponibles.';return;}
    box.innerHTML='Pendientes a asignar: <b>'+n(plan.pending)+'</b>. Tiempo total estimado: <b>'+plan.totalHours.toFixed(1)+' h</b>.<br>'+
      plan.groups.filter(g=>g.points.length).map(g=>esc(g.user.username)+': '+g.points.length+' viviendas, '+g.distanceKm.toFixed(2)+' km, '+(g.minutes/60).toFixed(1)+' h').join('<br>');
  }
  async function autoPlanAssignments_(){
    const userCount=Number(document.getElementById('planUsers')?document.getElementById('planUsers').value:4)||4;
    const minutes=Number(document.getElementById('planMinutes')?document.getElementById('planMinutes').value:surveyTimeEstimate_())||surveyTimeEstimate_();
    const kmh=Number(document.getElementById('planTravelKmh')?document.getElementById('planTravelKmh').value:3.5)||3.5;
    const start=Number(document.getElementById('planStartOrder')?document.getElementById('planStartOrder').value:1)||1;
    const plan=buildAutoPlan_(userCount,minutes,kmh,start);
    if(!plan.assignments.length){toast('error','No hay viviendas pendientes o usuarios genericos disponibles.');return;}
    setLoading(true);
    try{
      const r=await callServer('saveDwellingAssignments',sessionToken(),plan.assignments);
      toast('success','Plan operativo generado: '+r.saved+' viviendas, '+plan.groups.filter(g=>g.points.length).length+' encuestadores.');
      state.fieldMapSelected={}; state.fieldMap=null; await loadFieldMap_();
    }catch(e){toast('error',e.message||String(e));}
    finally{setLoading(false);}
  }
  function bindAssignmentControls_(){
    updateSelectionCount_();
    const clearSel=document.getElementById('clearSelection'); if(clearSel) clearSel.onclick=()=>{state.fieldMapSelected={};initFieldMap_();};
    const save=document.getElementById('saveAssignments'); if(save) save.onclick=()=>saveSelectedAssignments_(false);
    const clear=document.getElementById('clearAssignments'); if(clear) clear.onclick=()=>saveSelectedAssignments_(true);
    const auto=document.getElementById('autoPlanAssignments'); if(auto) auto.onclick=autoPlanAssignments_;
    ['planUsers','planMinutes','planTravelKmh','planStartOrder'].forEach(id=>{const el=document.getElementById(id); if(el) el.oninput=updatePlanPreview_;});
    updatePlanPreview_();
  }
  async function saveSelectedAssignments_(release){
    const ids=Object.keys(state.fieldMapSelected||{});
    if(!ids.length){toast('error','Seleccione al menos una vivienda en el mapa.');return;}
    const user=document.getElementById('assignUser')?document.getElementById('assignUser').value:'';
    if(!release && !user){toast('error','Seleccione un encuestador.');return;}
    const start=Number(document.getElementById('assignStart')?document.getElementById('assignStart').value:1)||1;
    const priority=document.getElementById('assignPriority')?document.getElementById('assignPriority').value:'normal';
    const notes=document.getElementById('assignNotes')?document.getElementById('assignNotes').value:'';
    const changes=ids.map((id,i)=>({vivienda_id:id,assigned_to:release?'':user,priority:priority,route_order:release?'':String(start+i),notes:notes,status:release?'sin_asignar':'asignada'}));
    setLoading(true);
    try{
      const r=await callServer('saveDwellingAssignments',sessionToken(),changes);
      toast('success',(release?'Liberadas ':'Asignadas ')+r.saved+' viviendas.');
      state.fieldMapSelected={}; state.fieldMap=null; await loadFieldMap_();
    }catch(e){toast('error',e.message||String(e));}
    finally{setLoading(false);}
  }
  function startSurveyForDwelling_(id){
    const p=(state.fieldMap&&state.fieldMap.dwellings||[]).find(x=>String(x.id)===String(id));
    if(!p)return;
    state.values.vivienda_mapeada_id=String(p.id);
    state.values.vivienda_mapeada_n=String(p.n);
    state.values.vivienda_mapeada_lat=String(p.lat);
    state.values.vivienda_mapeada_lng=String(p.lng);
    state.values.vivienda_asignada_a=p.assigned_to||((state.fieldMap.currentUser||{}).username||'');
    if(!state.values.comunidad) state.values.comunidad='Isla Hermosa';
    if(!state.values.barrio_localidad) state.values.barrio_localidad='Isla Tuyu';
    saveDraft();
    state.tab='formulario';
    toast('success','Encuesta vinculada a vivienda '+p.n+'.');
    render();
  }
  window.startSurveyForDwelling_ = startSurveyForDwelling_;

  function dashboardView_(){
    if(state.dashboardError) return '<div class="card error"><h3>Error al cargar el dashboard</h3><p>'+esc(state.dashboardError)+'</p><div class="toolbar" style="margin-top:12px"><button class="btn" id="retryDash">Reintentar</button></div></div>';
    if(!state.dashboard) return '<div class="card"><span class="loader"></span> Cargando dashboard...</div>';
    const k=state.dashboard.kpi, c=state.dashboard.charts;
    const meta=state.dashboard.meta||{};
    const metaHtml=meta.limited?'<p class="small muted">Vista limitada a las últimas '+n(meta.rowLimit)+' respuestas para mantener carga rápida.</p>':'';
    return filtersView_()+metaHtml+'<div class="grid cols-4"><div class="kpi"><span>Entrevistas</span><b>'+n(k.total)+'</b></div><div class="kpi"><span>Mujeres</span><b>'+pct(k.pctMujeres)+'</b></div><div class="kpi"><span>Pertenencia indígena</span><b>'+pct(k.pctIndigena)+'</b></div><div class="kpi"><span>GPS capturado</span><b>'+pct(k.pctGps)+'</b></div><div class="kpi"><span>Edad promedio</span><b>'+esc(k.edadPromedio||'—')+'</b></div><div class="kpi"><span>Tamaño hogar prom.</span><b>'+esc(k.tamanoHogarPromedio||'—')+'</b></div><div class="kpi"><span>Venta digital</span><b>'+pct(k.pctVentaDigital)+'</b></div><div class="kpi"><span>Fotos cargadas</span><b>'+n(k.fotos)+'</b></div></div>'+
      '<div class="grid cols-2"><div class="card"><h3>Tipos de artesanía</h3>'+barList_(c.tipo)+'</div><div class="card"><h3>Canales principales de venta</h3>'+barList_(c.canal)+'</div><div class="card"><h3>Prioridad de apoyo</h3>'+barList_(c.prioridad)+'</div><div class="card"><h3>Ingreso artesanal declarado</h3>'+barList_(c.ingreso)+'</div><div class="card"><h3>Comunidades/localidades</h3>'+barList_(c.comunidad)+'</div><div class="card"><h3>Calidad de registros</h3>'+barList_(c.calidad)+'</div></div>'+
      '<div class="card"><h3>Últimas entrevistas</h3>'+table_(state.dashboard.rowsPreview)+'</div>';
  }
  function filtersView_(){
    const f=state.dashboard?state.dashboard.filters:{};
    function sel(name,label){const items=(f&&f[name])||[];return '<label>'+label+'<select class="control dash-filter" data-filter="'+name+'"><option value="">Todos</option>'+items.map(x=>'<option '+(state.filters[name]===x.label?'selected':'')+' value="'+esc(x.label)+'">'+esc(x.label)+' ('+n(x.value)+')</option>').join('')+'</select></label>';}
    return '<div class="card"><div class="toolbar" style="justify-content:space-between"><div class="grid cols-4" style="flex:1">'+sel('comunidad','Comunidad')+sel('sexo','Sexo')+sel('tipo_artesania_principal','Tipo de artesanía')+sel('calidad_estado','Calidad')+'</div><button class="btn secondary" id="refreshDash">Actualizar</button></div></div>';
  }
  function barList_(items){
    items=items||[]; const max=Math.max(1,...items.map(x=>Number(x.value||0)));
    if(!items.length)return'<p class="muted">Sin datos.</p>';
    return '<div class="bar-list">'+items.slice(0,10).map(x=>'<div class="bar-row"><span class="small">'+esc(x.label)+'</span><div class="bar-track"><div class="bar-fill" style="width:'+(Number(x.value||0)/max*100)+'%"></div></div><b>'+n(x.value)+'</b></div>').join('')+'</div>';
  }
  async function loadDashboard_(){
    if(!state.session)return;
    state.dashboardError=null;
    if(state.tab==='dashboard' && !state.dashboard) render();
    try{
      state.dashboard=await callServer('getDashboardSummary',sessionToken(),state.filters||{});
    }catch(err){
      const msg=String(err.message||err);
      state.dashboardError=msg;
      if(/expira|no iniciada|sesi/i.test(msg)){saveSession(null); localStorage.removeItem(SESSION_KEY);}
    }
    try{ render(); }catch(e){ app.innerHTML+='<div class="card error" style="margin:1rem"><b>Error al dibujar dashboard:</b> '+esc(String(e))+'</div>'; }
  }
  function bindDashboard_(){
    const r=document.getElementById('refreshDash'); if(r) r.onclick=()=>{state.dashboardError=null; state.dashboard=null; loadDashboard_();};
    const retry=document.getElementById('retryDash'); if(retry) retry.onclick=()=>{state.dashboardError=null; loadDashboard_();};
    document.querySelectorAll('.dash-filter').forEach(el=>el.onchange=()=>{state.filters[el.dataset.filter]=el.value; loadDashboard_();});
  }

  function responsesView_(){
    if(state.responsesError) return '<div class="card error"><h3>Error al cargar respuestas</h3><p>'+esc(state.responsesError)+'</p><div class="toolbar" style="margin-top:12px"><button class="btn" id="retryResp">Reintentar</button></div></div>';
    if(!state.responses) return '<div class="card"><span class="loader"></span> Cargando respuestas...</div>';
    return '<div class="card"><div class="toolbar"><input class="control" id="respQ" placeholder="Buscar por nombre, cédula, comunidad, producto..." style="max-width:460px" value="'+esc(state.filters.q||'')+'"><button class="btn" id="searchResp">Buscar</button><button class="btn secondary" id="refreshResp">Actualizar</button></div><p class="muted small">Total encontrado: '+n(state.responses.total)+(state.responses.limited?' (vista limitada)':'')+'</p></div><div class="card">'+table_(state.responses.rows||[])+'</div>';
  }
  async function loadResponses_(){
    if(!state.session)return;
    state.responsesError=null;
    try{
      state.responses=await callServer('listResponses',sessionToken(),state.filters||{},250);
    }catch(err){
      const msg=String(err.message||err);
      state.responsesError=msg;
      if(/expira|no iniciada|sesi/i.test(msg)){saveSession(null); localStorage.removeItem(SESSION_KEY);}
    }
    try{ render(); }catch(e){ app.innerHTML+='<div class="card error" style="margin:1rem"><b>Error al dibujar respuestas:</b> '+esc(String(e))+'</div>'; }
  }
  function bindResponses_(){
    const retryR=document.getElementById('retryResp'); if(retryR) retryR.onclick=()=>{state.responsesError=null; loadResponses_();};
    const s=document.getElementById('searchResp'); if(s) s.onclick=()=>{state.filters.q=document.getElementById('respQ').value; loadResponses_();};
    const r=document.getElementById('refreshResp'); if(r) r.onclick=()=>{state.responsesError=null; state.responses=null; loadResponses_();};
    const q=document.getElementById('respQ'); if(q) q.onkeydown=e=>{if(e.key==='Enter'){state.filters.q=q.value; loadResponses_();}};
  }
  function table_(rows){
    rows=rows||[]; if(!rows.length)return'<p class="muted">Sin datos para mostrar.</p>';
    const cols=['fecha_encuesta','nombre_completo','sexo','edad','comunidad','tipo_artesania_principal','principal_canal_venta','ingreso_artesania_banda','calidad_estado','cantidad_fotos'];
    return '<div class="table-wrap"><table><thead><tr>'+cols.map(c=>'<th>'+esc(c)+'</th>').join('')+'</tr></thead><tbody>'+rows.map(r=>'<tr>'+cols.map(c=>'<td>'+esc(r[c]||'')+'</td>').join('')+'</tr>').join('')+'</tbody></table></div>';
  }

  function adminView_(){
    const links=state.bootstrap.app.links||{};
    return '<div class="grid cols-2"><div class="card"><h3>Acciones de mantenimiento</h3><p class="muted">Utilice estas acciones luego de cambios en el cuestionario o para reconstruir bases analíticas.</p><div class="toolbar"><button class="btn" id="syncMeta">Sincronizar cuestionario</button><button class="btn secondary" id="rebuildAnalytics">Reconstruir analítica</button></div></div><div class="card"><h3>Enlaces operativos</h3><div class="admin-links"><a href="'+esc(links.spreadsheetUrl)+'" target="_blank">Google Sheet backend</a><a href="'+esc(links.photosFolderUrl)+'" target="_blank">Carpeta Drive de fotos</a><a href="'+esc(links.repositoryUrl)+'" target="_blank">Repositorio GitHub</a></div></div></div><div class="card"><h3>Gestión de usuarios</h3><p class="muted">Los usuarios se administran en la hoja USUARIOS o mediante la función saveUser(). Por seguridad, cambie las credenciales iniciales.</p></div>';
  }
  function bindAdmin_(){
    const s=document.getElementById('syncMeta'); if(s) s.onclick=async()=>{setLoading(true);try{await callServer('syncQuestionnaireMetadata',sessionToken());toast('success','Cuestionario sincronizado.');}catch(e){toast('error',e.message||String(e));}finally{setLoading(false);}};
    const r=document.getElementById('rebuildAnalytics'); if(r) r.onclick=async()=>{setLoading(true);try{const res=await callServer('rebuildAnalytics',sessionToken());toast('success','Base analítica reconstruida: '+res.rows+' filas.');}catch(e){toast('error',e.message||String(e));}finally{setLoading(false);}};
  }

  async function loadAdminUsers_(){
    if(!state.session || state.session.role!=='admin')return;
    state.adminUsersError=null;
    try{state.adminUsers=await callServer('listUsers',sessionToken());}
    catch(e){state.adminUsersError=e.message||String(e);}
    render();
  }
  async function saveNewUser_(){
    const username=(document.getElementById('newUserName')?.value||'').trim();
    if(!username){toast('error','Ingrese un usuario.');return;}
    const user={
      username:username,
      display_name:(document.getElementById('newUserDisplay')?.value||username).trim(),
      role:document.getElementById('newUserRole')?.value||'editor',
      password_temporal:document.getElementById('newUserPass')?.value||'123456',
      active:'SI',
      must_change_password:'SI',
      notes:document.getElementById('newUserNotes')?.value||''
    };
    setLoading(true);
    try{await callServer('saveUser',sessionToken(),user); toast('success','Usuario guardado: '+username); state.adminUsers=null; await loadAdminUsers_();}
    catch(e){toast('error',e.message||String(e));}
    finally{setLoading(false);}
  }
  adminView_ = function(){
    const links=state.bootstrap.app.links||{};
    const users=state.adminUsers||[];
    const userBox=state.adminUsersError?'<div class="card error"><h3>Error al cargar usuarios</h3><p>'+esc(state.adminUsersError)+'</p><button class="btn" id="reloadUsers">Reintentar</button></div>':
      '<div class="card"><div class="section-title"><div><h3>Gestion de usuarios</h3><p class="muted">Cree usuarios genericos o asigne nombre real al usuario de campo. Los cambios se guardan en la hoja USUARIOS.</p></div><button class="btn secondary" id="reloadUsers">Actualizar</button></div>'+
      (!state.adminUsers?'<p><span class="loader"></span> Cargando usuarios...</p>':
      '<div class="grid cols-4"><label>Usuario<input class="control" id="newUserName" placeholder="encuestador9"></label><label>Nombre visible<input class="control" id="newUserDisplay" placeholder="Nombre real o cuadrilla"></label><label>Rol<select class="control" id="newUserRole"><option>editor</option><option>viewer</option><option>admin</option></select></label><label>Clave temporal<input class="control" id="newUserPass" value="123456"></label></div><label style="display:block;margin-top:10px">Notas<input class="control" id="newUserNotes" placeholder="Ej: asignado a persona real el dia del operativo"></label><div class="toolbar" style="margin-top:12px"><button class="btn" id="saveNewUser">Guardar usuario</button></div><div class="table-wrap" style="margin-top:14px"><table><thead><tr><th>Usuario</th><th>Nombre</th><th>Rol</th><th>Activo</th><th>Cambio clave</th><th>Notas</th></tr></thead><tbody>'+users.map(u=>'<tr><td><b>'+esc(u.username)+'</b></td><td>'+esc(u.display_name)+'</td><td>'+esc(u.role)+'</td><td>'+esc(u.active)+'</td><td>'+esc(u.must_change_password)+'</td><td>'+esc(u.notes)+'</td></tr>').join('')+'</tbody></table></div>')+'</div>';
    return '<div class="grid cols-2"><div class="card"><h3>Acciones de mantenimiento</h3><p class="muted">Utilice estas acciones luego de cambios en el cuestionario o para reconstruir bases analiticas.</p><div class="toolbar"><button class="btn" id="syncMeta">Sincronizar cuestionario</button><button class="btn secondary" id="rebuildAnalytics">Reconstruir analitica</button></div></div><div class="card"><h3>Enlaces operativos</h3><div class="admin-links"><a href="'+esc(links.spreadsheetUrl)+'" target="_blank">Google Sheet backend</a><a href="'+esc(links.photosFolderUrl)+'" target="_blank">Carpeta Drive de fotos</a><a href="'+esc(links.repositoryUrl)+'" target="_blank">Repositorio GitHub</a></div></div></div>'+userBox;
  };
  bindAdmin_ = function(){
    const s=document.getElementById('syncMeta'); if(s) s.onclick=async()=>{setLoading(true);try{await callServer('syncQuestionnaireMetadata',sessionToken());toast('success','Cuestionario sincronizado.');}catch(e){toast('error',e.message||String(e));}finally{setLoading(false);}};
    const r=document.getElementById('rebuildAnalytics'); if(r) r.onclick=async()=>{setLoading(true);try{const res=await callServer('rebuildAnalytics',sessionToken());toast('success','Base analitica reconstruida: '+res.rows+' filas.');}catch(e){toast('error',e.message||String(e));}finally{setLoading(false);}};
    const reload=document.getElementById('reloadUsers'); if(reload) reload.onclick=()=>{state.adminUsers=null;loadAdminUsers_();};
    const save=document.getElementById('saveNewUser'); if(save) save.onclick=saveNewUser_;
    if(state.session&&state.session.role==='admin'&&!state.adminUsers&&!state.adminUsersError) loadAdminUsers_();
  };

  document.addEventListener('DOMContentLoaded', init);
})();
</script>
